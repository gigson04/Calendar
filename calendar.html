<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1623;
    --surface:   #1a2235;
    --surface2:  #212d42;
    --border:    #2e3d58;
    --text:      #e8edf5;
    --muted:     #6b7fa3;
    --amber:     #f0a500;
    --amber-dim: #7a530a;
    --blue:      #4a90d9;
    --red:       #e05c5c;
    --green:     #4caf87;
    --radius:    14px;
    --transition: 220ms ease;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrapper {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    flex: 1;
    min-width: 0;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .month-title {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .nav-group { display: flex; gap: 6px; }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), color var(--transition);
  }
  .nav-btn:hover { background: var(--blue); border-color: var(--blue); }
  .today-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0 14px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all var(--transition);
  }
  .today-btn:hover { background: var(--amber); border-color: var(--amber); color: var(--bg); }

  .dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
  }
  .dow-cell {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0;
  }
  .dow-cell:nth-child(1), .dow-cell:nth-child(7) { color: var(--amber-dim); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8px;
    cursor: pointer;
    position: relative;
    transition: background var(--transition);
    user-select: none;
  }
  .day-cell:hover:not(.empty) { background: var(--surface2); }
  .day-cell.empty { cursor: default; pointer-events: none; }

  .day-num {
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1;
    z-index: 1;
    position: relative;
  }
  .day-cell.other-month .day-num { color: var(--border); }
  .day-cell.weekend .day-num { color: #8fa0c0; }

  .day-cell.today .day-num {
    background: var(--amber);
    color: var(--bg);
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }

  .day-cell.selected:not(.today) { background: #1e3558; }
  .day-cell.selected:not(.today) .day-num { color: var(--blue); font-weight: 700; }

  .dots {
    display: flex; gap: 3px;
    margin-top: 4px;
    min-height: 6px;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.blue  { background: var(--blue); }
  .dot.amber { background: var(--amber); }
  .dot.red   { background: var(--red); }
  .dot.green { background: var(--green); }

  .sidebar {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .panel-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .sel-date-display {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .sel-date-sub { font-size: 0.8rem; color: var(--muted); }

  .event-list { display: flex; flex-direction: column; gap: 8px; }
  .event-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 10px;
    border-left: 3px solid transparent;
    transition: border-color var(--transition);
  }
  .event-item.blue  { border-left-color: var(--blue); }
  .event-item.amber { border-left-color: var(--amber); }
  .event-item.red   { border-left-color: var(--red); }
  .event-item.green { border-left-color: var(--green); }
  .event-name { font-size: 0.82rem; font-weight: 500; color: var(--text); line-height: 1.3; }
  .event-time { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .no-events  { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 10px 0; }

  .add-form { display: flex; flex-direction: column; gap: 8px; }
  .add-form input, .add-form select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: inherit;
    outline: none;
    transition: border-color var(--transition);
  }
  .add-form input:focus, .add-form select:focus { border-color: var(--blue); }
  .add-form input::placeholder { color: var(--muted); }
  .add-form select option { background: var(--surface2); }
  .add-btn {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 9px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity var(--transition);
  }
  .add-btn:hover { opacity: 0.85; }

  .stats { display: flex; flex-direction: column; gap: 8px; }
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8rem;
  }
  .stat-label { color: var(--muted); }
  .stat-val   { font-weight: 600; }
  .stat-bar   { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .stat-fill  { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.4s ease; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .cal-grid.animate { animation: slideIn 0.22s ease forwards; }

  @media (max-width: 640px) {
    .wrapper { flex-direction: column; }
    .sidebar { width: 100%; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="cal-header">
      <span class="month-title" id="monthTitle">—</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="today-btn" onclick="goToday()">Today</button>
        <div class="nav-group">
          <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
          <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
        </div>
      </div>
    </div>
    <div class="dow-row">
      <div class="dow-cell">Sun</div><div class="dow-cell">Mon</div>
      <div class="dow-cell">Tue</div><div class="dow-cell">Wed</div>
      <div class="dow-cell">Thu</div><div class="dow-cell">Fri</div>
      <div class="dow-cell">Sat</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">Selected Day</div>
      <div class="sel-date-display" id="selDateNum">—</div>
      <div class="sel-date-sub" id="selDateFull">Pick a date</div>
    </div>

    <div class="panel" style="flex:1;">
      <div class="panel-title">Events</div>
      <div class="event-list" id="eventList"><p class="no-events">No events</p></div>
    </div>

    <div class="panel">
      <div class="panel-title">Add Event</div>
      <div class="add-form">
        <input type="text" id="evtName" placeholder="Event name…" maxlength="40"/>
        <input type="time" id="evtTime" value="09:00"/>
        <select id="evtColor">
          <option value="blue">🔵 Work</option>
          <option value="amber">🟡 Personal</option>
          <option value="red">🔴 Urgent</option>
          <option value="green">🟢 Health</option>
        </select>
        <button class="add-btn" onclick="addEvent()">Add to Selected Day</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">This Month</div>
      <div class="stats" id="statsPanel"></div>
    </div>
  </div>
</div>

<script>
  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  let now = new Date();
  let viewYear  = now.getFullYear();
  let viewMonth = now.getMonth();
  let selectedDate = null;

  let events = JSON.parse(localStorage.getItem('cal_events') || '{}');

  function seedDemo() {
    const key = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const today = new Date();
    const add = (offset, name, time, color) => {
      const d = new Date(today); d.setDate(d.getDate() + offset);
      const k = key(d);
      if (!events[k]) events[k] = [];
      if (!events[k].find(e => e.name === name)) events[k].push({name, time, color});
    };
    add(0,  'Team standup',    '09:00', 'blue');
    add(0,  'Lunch with Alex', '12:30', 'amber');
    add(2,  'Dentist',         '10:00', 'red');
    add(3,  'Gym session',     '07:00', 'green');
    add(5,  'Project review',  '14:00', 'blue');
    add(7,  'Birthday dinner', '19:00', 'amber');
    add(-1, 'Morning run',     '06:30', 'green');
    save();
  }
  if (!localStorage.getItem('cal_events')) seedDemo();

  function save() { localStorage.setItem('cal_events', JSON.stringify(events)); }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function render(animate = false) {
    document.getElementById('monthTitle').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    if (animate) { grid.classList.remove('animate'); void grid.offsetWidth; grid.classList.add('animate'); }

    const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      grid.appendChild(makeCell(daysInPrev - firstDay + 1 + i, viewYear, viewMonth - 1, true));
    }
    for (let d = 1; d <= daysInMonth; d++) {
      grid.appendChild(makeCell(d, viewYear, viewMonth, false));
    }
    const total = firstDay + daysInMonth;
    const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= remaining; d++) {
      grid.appendChild(makeCell(d, viewYear, viewMonth + 1, true));
    }

    renderStats();
    renderSidebar();
  }

  function makeCell(d, y, m, otherMonth) {
    const date = new Date(y, m, d);
    const ry = date.getFullYear(), rm = date.getMonth(), rd = date.getDate();

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (otherMonth) cell.classList.add('other-month');

    const dow = date.getDay();
    if (dow === 0 || dow === 6) cell.classList.add('weekend');

    const isToday = ry === now.getFullYear() && rm === now.getMonth() && rd === now.getDate();
    if (isToday) cell.classList.add('today');

    if (selectedDate) {
      const s = selectedDate;
      if (ry === s.y && rm === s.m && rd === s.d) cell.classList.add('selected');
    }

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = rd;
    cell.appendChild(numEl);

    const key = dateKey(ry, rm, rd);
    const evts = events[key] || [];
    if (evts.length) {
      const dots = document.createElement('div');
      dots.className = 'dots';
      evts.slice(0, 3).forEach(e => {
        const dot = document.createElement('div');
        dot.className = `dot ${e.color}`;
        dots.appendChild(dot);
      });
      cell.appendChild(dots);
    }

    cell.addEventListener('click', () => {
      selectedDate = {y: ry, m: rm, d: rd};
      render();
    });
    return cell;
  }

  function renderSidebar() {
    const numEl  = document.getElementById('selDateNum');
    const fullEl = document.getElementById('selDateFull');
    const listEl = document.getElementById('eventList');

    if (!selectedDate) {
      numEl.textContent  = '—';
      fullEl.textContent = 'Pick a date';
      listEl.innerHTML   = '<p class="no-events">No date selected</p>';
      return;
    }
    const {y, m, d} = selectedDate;
    const date = new Date(y, m, d);
    numEl.textContent  = d;
    fullEl.textContent = `${DAYS_FULL[date.getDay()]}, ${MONTHS[m]} ${y}`;

    const key  = dateKey(y, m, d);
    const evts = events[key] || [];
    listEl.innerHTML = '';
    if (!evts.length) {
      listEl.innerHTML = '<p class="no-events">No events</p>';
    } else {
      evts.forEach((e, i) => {
        const item = document.createElement('div');
        item.className = `event-item ${e.color}`;
        item.innerHTML = `
          <div style="flex:1">
            <div class="event-name">${e.name}</div>
            <div class="event-time">${formatTime(e.time)}</div>
          </div>
          <div style="cursor:pointer;color:var(--muted);font-size:0.75rem;align-self:center;" onclick="deleteEvent('${key}',${i})">✕</div>`;
        listEl.appendChild(item);
      });
    }
  }

  function formatTime(t) {
    if (!t) return '';
    const [h, min] = t.split(':').map(Number);
    const ap = h >= 12 ? 'PM' : 'AM';
    return `${((h % 12) || 12)}:${String(min).padStart(2, '0')} ${ap}`;
  }

  function addEvent() {
    if (!selectedDate) { alert('Please select a day first.'); return; }
    const name  = document.getElementById('evtName').value.trim();
    const time  = document.getElementById('evtTime').value;
    const color = document.getElementById('evtColor').value;
    if (!name) { document.getElementById('evtName').focus(); return; }
    const key = dateKey(selectedDate.y, selectedDate.m, selectedDate.d);
    if (!events[key]) events[key] = [];
    events[key].push({name, time, color});
    events[key].sort((a, b) => a.time.localeCompare(b.time));
    save();
    document.getElementById('evtName').value = '';
    render();
  }

  function deleteEvent(key, idx) {
    events[key].splice(idx, 1);
    if (!events[key].length) delete events[key];
    save();
    render();
  }

  function renderStats() {
    const panel = document.getElementById('statsPanel');
    const counts = {blue: 0, amber: 0, red: 0, green: 0};
    let total = 0;
    for (const key in events) {
      const [ky, km] = key.split('-').map(Number);
      if (ky === viewYear && km - 1 === viewMonth) {
        events[key].forEach(e => { counts[e.color]++; total++; });
      }
    }
    const labels = {blue: 'Work', amber: 'Personal', red: 'Urgent', green: 'Health'};
    const colors = {blue: 'var(--blue)', amber: 'var(--amber)', red: 'var(--red)', green: 'var(--green)'};
    panel.innerHTML = '';
    if (total === 0) {
      panel.innerHTML = '<div style="font-size:.8rem;color:var(--muted)">No events this month</div>';
      return;
    }
    Object.keys(counts).forEach(c => {
      if (!counts[c]) return;
      const pct = Math.round((counts[c] / total) * 100);
      panel.innerHTML += `
        <div class="stat-row">
          <span class="stat-label">${labels[c]}</span>
          <span class="stat-val">${counts[c]}</span>
        </div>
        <div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${colors[c]}"></div></div>`;
    });
    panel.innerHTML += `<div class="stat-row" style="margin-top:4px;border-top:1px solid var(--border);padding-top:8px">
      <span class="stat-label">Total</span><span class="stat-val">${total}</span></div>`;
  }

  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    render(true);
  }

  function goToday() {
    viewYear  = now.getFullYear();
    viewMonth = now.getMonth();
    selectedDate = {y: now.getFullYear(), m: now.getMonth(), d: now.getDate()};
    render(true);
  }

  selectedDate = {y: now.getFullYear(), m: now.getMonth(), d: now.getDate()};
  render();
</script>
</body>
</html>
